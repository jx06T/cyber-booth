<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Booth MVP</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* 基礎載入動畫 */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #ec4899;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 影片裁切核心：確保 1280x1280 裁切成 16:9 */
        .video-container {
            width: 100%;
            max-width: 1000px; /* 控制螢幕最大寬度 */
            aspect-ratio: 16 / 9;
            background: #000;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(236, 72, 153, 0.3);
            border-radius: 12px;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 關鍵：裁切上下部分 */
            transform: scale(2);
        }
    </style>
</head>

<body class="bg-gray-950 h-screen flex flex-col items-center justify-center text-white font-mono p-4">

    <!-- 1. 頂部狀態列 (懸浮在影片上方) -->
    <div class="video-container shadow-2xl ">
        
        <!-- 影片本體 -->
        <video id="webcam" autoplay playsinline></video>

        <!-- 載入中遮罩 -->
        <div id="loading-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-900 z-10">
            <div class="loader mb-4"></div>
            <p class="text-xs text-pink-500 uppercase tracking-widest">Initializing Stream</p>
        </div>

        <!-- 影片上的資訊 Overlay -->
        <div class="absolute inset-0 pointer-events-none flex flex-col justify-between p-4">
            <div class="flex justify-between items-start">
                <div class="bg-black/50 backdrop-blur-md border border-pink-500/50 px-3 py-1 rounded">
                    <span class="text-xs text-pink-400">●</span>
                    <span id="statusText" class="text-sm">READY</span>
                </div>
                <div class="bg-black/50 backdrop-blur-md border border-gray-500/50 px-3 py-1 rounded text-sm">
                    SHOTS: <span id="progress" class="text-pink-500">0/4</span>
                </div>
            </div>
            
            <!-- 錄製中紅點 -->
            <div id="rec-indicator" class="hidden">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-red-600 rounded-full animate-pulse"></div>
                    <span class="text-xs font-bold text-red-500 shadow-sm">RECORDING</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. 下方控制區 -->
    <div id="ui-box" class="mt-6 w-full max-w-lg h-20">
        
        <!-- State 2: IDLE -->
        <div id="idle-ui" class="flex justify-center">
            <button id="take-btn" disabled onclick="socket.emit('trigger_shot')"
                class="group relative border border-pink-500 disabled:border-slate-500 px-12 py-4 rounded-full overflow-hidden transition-all  enabled:hover:bg-pink-500">
                <span class="relative z-10 text-xl font-bold group-enabled:group-hover:text-black group-disabled:group-hover:text-white">Initializing...</span>
            </button>
        </div>

        <!-- State 0: RECORDING -->
        <div id="rec-ui" class="hidden flex justify-center">
            <button onclick="socket.emit('user_clicked_stop')"
                class="bg-red-600 hover:bg-red-500 px-12 py-4 rounded-full text-xl font-bold animate-pulse transition-colors">
                STOP & SAVE
            </button>
        </div>

        <!-- State 4: REVIEW -->
        <div id="review-ui" class="hidden">
            <div class="flex flex-col items-center gap-4">
                <!-- <p class="text-sm text-gray-400 uppercase tracking-widest">Review your shot</p> -->
                <div class="flex justify-center gap-4 w-full">
                    <button id="keepBtn"
                        class="flex-1 border border-green-500 text-green-500 py-4 rounded-xl font-bold hover:bg-green-500 hover:text-black transition-all">KEEP</button>
                    <button onclick="socket.emit('choice_retake')"
                        class="flex-1 border border-gray-600 text-gray-400 py-4 rounded-xl font-bold hover:bg-gray-600 hover:text-white transition-all">RETAKE</button>
                </div>
            </div>
        </div>

        <!-- State 1: FINISHED -->
        <div id="final-ui" class="hidden text-center">
            <p class="text-xl text-pink-400 animate-pulse font-bold tracking-tighter">GENERATING COLLAGE...</p>
        </div>
    </div>

    <!-- 3. 系統重置 (縮小放置角落) -->
    <div class="fixed bottom-6 right-6">
        <button id="resetBtn" class="text-gray-400 hover:text-red-400 text-[10px] tracking-widest transition-colors uppercase">
            [ Emergency Reset ]
        </button>
    </div>

    <script>
        const socket = io();
        let currentTempFile = "";

        const takeBtn = document.getElementById('take-btn');
        const video = document.getElementById('webcam');
        const loadingOverlay = document.getElementById('loading-overlay');
        const recIndicator = document.getElementById('rec-indicator');

        // Start session on load
        window.onload = () => socket.emit('user_clicked_start');

        // 攝影機啟動邏輯
        navigator.mediaDevices.getUserMedia({
            video: { width: 1280, height: 1280 } // 原始輸入是 1:1
        })
        .then(stream => {
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                loadingOverlay.classList.add('hidden'); // 隱藏載入動畫
                takeBtn.disabled = false;
                takeBtn.childNodes[1].textContent = "TAKE PHOTO";

            };
        })
        .catch(err => {
            console.error("Camera error:", err);
            loadingOverlay.innerHTML = "<p class='text-red-500'>Camera Access Denied</p>";
        });

        const keepBtn = document.getElementById('keepBtn');
        const resetBtn = document.getElementById('resetBtn');

        keepBtn.onclick = () => socket.emit('choice_keep', { filename: currentTempFile });
        resetBtn.onclick = () => socket.emit('user_clicked_reset');

        socket.on('status_update', (data) => {
            document.getElementById('statusText').innerText = data.message.toUpperCase();
            if (data.kept !== undefined) document.getElementById('progress').innerText = `${data.kept}/4`;
            if (data.currentFile) currentTempFile = data.currentFile;

            // UI State Switching
            const uis = {
                idle: document.getElementById('idle-ui'),
                rec: document.getElementById('rec-ui'),
                rev: document.getElementById('review-ui'),
                fin: document.getElementById('final-ui')
            };

            Object.values(uis).forEach(el => el.classList.add('hidden'));
            recIndicator.classList.add('hidden');

            if (data.state === 0) {
                uis.rec.classList.remove('hidden');
                recIndicator.classList.remove('hidden');
            }
            else if (data.state === 4) uis.rev.classList.remove('hidden');
            else if (data.state === 1) uis.fin.classList.remove('hidden');
            else uis.idle.classList.remove('hidden');
        });
    </script>
</body>
</html>
